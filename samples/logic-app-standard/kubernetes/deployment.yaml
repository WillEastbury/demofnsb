apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-writer-logic-app
  namespace: message-persistence-sample
spec:
  replicas: 0
  selector:
    matchLabels:
      app: message-writer-logic-app
  template:
    metadata:
      labels:
        app: message-writer-logic-app
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
        - name: logic-app
          image: ghcr.io/willeastbury/demofnsb-logic-app:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: message-writer-logic-app
            - secretRef:
                name: message-writer-logic-app
          ports:
            - name: functions
              containerPort: 80
          startupProbe:
            tcpSocket:
              port: functions
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: functions
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: functions
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
