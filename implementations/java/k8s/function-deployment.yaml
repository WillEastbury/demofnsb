apiVersion: apps/v1
kind: Deployment
metadata:
  name: attribute-status-function
  namespace: attribute-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attribute-status-function
  template:
    metadata:
      labels:
        app: attribute-status-function
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: attribute-status
      terminationGracePeriodSeconds: 30
      containers:
        - name: function
          image: ghcr.io/willeastbury/demofnsb-function:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: attribute-status
            - secretRef:
                name: attribute-status
                optional: true
          ports:
            - name: functions
              containerPort: 80
          readinessProbe:
            tcpSocket:
              port: functions
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: functions
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
