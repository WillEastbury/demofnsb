apiVersion: apps/v1
kind: Deployment
metadata:
  name: attribute-status-worker
  namespace: attribute-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attribute-status-worker
  template:
    metadata:
      labels:
        app: attribute-status-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: attribute-status
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: ghcr.io/willeastbury/demofnsb-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: attribute-status
            - secretRef:
                name: attribute-status
                optional: true
          ports:
            - name: health
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
